name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: npm run prisma:generate --workspace backend

      - name: Backend lint
        run: npm run lint --workspace backend

      - name: Backend typecheck
        run: npm run typecheck --workspace backend

      - name: Backend tests
        run: npm run test --workspace backend -- --runInBand

      - name: Backend build
        run: npm run build --workspace backend

      - name: Frontend lint
        run: npm run lint --workspace frontend

      - name: Frontend build
        run: npm run build --workspace frontend

  prisma-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tenant Prisma schema
        run: npx prisma validate --schema backend/prisma/schema.prisma

      - name: Validate control-plane Prisma schema
        run: npx prisma validate --schema backend/prisma/control-plane/schema.prisma
