services:
  postgres:
    image: postgres:16-alpine
    container_name: autoszap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoszap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autoszap"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: autoszap-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoszap-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000,http://localhost:3001,http://localhost:8081,http://127.0.0.1:8081,http://localhost:8082,http://127.0.0.1:8082,http://localhost:19006,http://127.0.0.1:19006}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-}
      ALLOW_PUBLIC_SIGNUP: ${ALLOW_PUBLIC_SIGNUP:-true}
      PLATFORM_RELEASES_MANIFEST_PATH: /deploy/platform-releases.json
      GITHUB_RELEASES_TOKEN: ${GITHUB_RELEASES_TOKEN:-}
      GITHUB_RELEASES_REPO: ${GITHUB_RELEASES_REPO:-Nycolazs/AutosZap}
      GITHUB_WINDOWS_ASSET_NAME: ${GITHUB_WINDOWS_ASSET_NAME:-autoszap-setup-latest.exe}
      CONTROL_PLANE_DATABASE_URL: ${CONTROL_PLANE_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/autoszap?schema=public}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoszap?schema=public
      TENANT_DATABASE_STRATEGY: ${TENANT_DATABASE_STRATEGY:-dedicated}
      TENANT_DATABASE_BASE_URL: ${TENANT_DATABASE_BASE_URL:-postgresql://postgres:postgres@postgres:5432/autoszap?schema=public}
      TENANT_DATABASE_ADMIN_URL: ${TENANT_DATABASE_ADMIN_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=public}
      TENANT_DATABASE_PREFIX: ${TENANT_DATABASE_PREFIX:-autozap_tenant}
      TENANT_ALLOW_SHARED_FALLBACK: ${TENANT_ALLOW_SHARED_FALLBACK:-true}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: autoszap-local-access-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      APP_ENCRYPTION_KEY: autoszap-local-encryption-key
      META_MODE: ${META_MODE:-DEV}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:-v23.0}
      META_WHATSAPP_ACCESS_TOKEN: ${META_WHATSAPP_ACCESS_TOKEN:-}
      META_WHATSAPP_PHONE_NUMBER_ID: ${META_WHATSAPP_PHONE_NUMBER_ID:-}
      META_WHATSAPP_BUSINESS_ACCOUNT_ID: ${META_WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      META_WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${META_WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_EMBEDDED_SIGNUP_CONFIG_ID: ${META_EMBEDDED_SIGNUP_CONFIG_ID:-}
      BACKEND_INTERNAL_BASE_URL: ${BACKEND_INTERNAL_BASE_URL:-http://backend:4000}
      WHATSAPP_WEB_GATEWAY_URL: ${WHATSAPP_WEB_GATEWAY_URL:-http://whatsapp-web-gateway:3001}
      WHATSAPP_WEB_GATEWAY_SHARED_SECRET: ${WHATSAPP_WEB_GATEWAY_SHARED_SECRET:-autoszap-local-whatsapp-web-secret}
      WHATSAPP_WEB_GATEWAY_CALLBACK_URL: ${WHATSAPP_WEB_GATEWAY_CALLBACK_URL:-}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-50mb}
    ports:
      - "4000:4000"
    volumes:
      - backend_storage:/app/storage
      - ./deploy:/deploy:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  whatsapp-web-gateway:
    build:
      context: ./apps/whatsapp-web-gateway
      dockerfile: Dockerfile
    container_name: autoszap-whatsapp-web-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3001
      BIND_HOST: 0.0.0.0
      GATEWAY_SHARED_SECRET: ${WHATSAPP_WEB_GATEWAY_SHARED_SECRET:-autoszap-local-whatsapp-web-secret}
      BACKEND_CALLBACK_BASE_URL: ${BACKEND_INTERNAL_BASE_URL:-http://backend:4000}
      SESSION_DIR: /data/sessions
      REGISTRY_FILE: /data/registry.json
      CHROMIUM_PATH: /usr/bin/chromium
      HEADLESS: ${WHATSAPP_WEB_GATEWAY_HEADLESS:-true}
      CALLBACK_TIMEOUT_MS: ${WHATSAPP_WEB_GATEWAY_CALLBACK_TIMEOUT_MS:-10000}
      AUTO_RESTART_DELAY_MS: ${WHATSAPP_WEB_GATEWAY_AUTO_RESTART_DELAY_MS:-5000}
    expose:
      - "3001"
    ports:
      - "127.0.0.1:${WHATSAPP_WEB_GATEWAY_PORT:-3001}:3001"
    volumes:
      - whatsapp_web_gateway_data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  whatsapp_web_gateway_data:
