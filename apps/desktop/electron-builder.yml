appId: com.autoszap.desktop
productName: AutoZap Desktop
artifactName: AutoZap-Desktop-${version}-${os}-${arch}.${ext}
directories:
  output: release
asar: true
files:
  - dist-renderer/**
  - dist-electron/**
  - package.json
extraMetadata:
  main: dist-electron/main.js
mac:
  category: public.app-category.business
  target:
    - dmg
win:
  icon: ../../frontend/app/favicon.ico
  target:
    - portable
linux:
  target:
    - AppImage
publish:
  provider: github
