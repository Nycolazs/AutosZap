appId: com.autoszap.desktop
productName: AutoZap Desktop
artifactName: AutoZap-Desktop-${version}-${os}-${arch}.${ext}
directories:
  output: release
asar: true
files:
  - dist-renderer/**
  - dist-electron/**
  - package.json
extraMetadata:
  main: dist-electron/main.js
mac:
  category: public.app-category.business
  target:
    - dmg
win:
  icon: ../../frontend/app/favicon.ico
  target:
    - nsis
nsis:
  installerIcon: ../../frontend/app/favicon.ico
  uninstallerIcon: ../../frontend/app/favicon.ico
linux:
  target:
    - AppImage
publish:
  provider: generic
  url: ${env.DESKTOP_UPDATES_BASE_URL}
